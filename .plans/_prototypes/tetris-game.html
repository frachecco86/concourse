<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }
        
        .score-board {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .score-board h3 {
            color: #666;
            font-size: 1rem;
        }
        
        .score-board span {
            color: #764ba2;
            font-size: 2rem;
            font-weight: bold;
        }
        
        canvas {
            border: 3px solid #333;
            background: #1a1a2e;
            border-radius: 5px;
            display: block;
        }
        
        .controls {
            margin-top: 1rem;
            color: #666;
            font-size: 0.9rem;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            display: none;
        }
        
        .game-over.active {
            display: block;
        }
        
        .game-over h2 {
            color: #e74c3c;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧩 Tetris</h1>
        
        <div class="score-board">
            <h3>Punteggio</h3>
            <span id="score">0</span>
        </div>
        
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <button class="btn" onclick="startGame()">🎮 Inizia Gioco</button>
        
        <div class="controls">
            <p>⬅️➡️ Muovi | ⬆️ Ruota |⬇️ Scendi</p>
            <p>Spazio: Caduta rapida</p>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>Game Over!</h2>
        <p>Punteggio finale: <span id="finalScore" style="font-size: 2rem; color: #764ba2;">0</span></p>
        <button class="btn" onclick="resetGame()">Rigioca</button>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        
        // Scala il contesto di 20x per rendere ogni blocco 20px
        context.scale(20, 20);
        
        // Colori dei pezzi
        const colors = [
            null,
            '#FF0D72', // T - viola
            '#0DC2FF', // I - blu
            '#0DFF72', // S - verde
            '#F538FF', // Z - rosa
            '#FF8E0D', // L - arancione
            '#FFE138', // O - giallo
            '#3877FF', // J - blu scuro
        ];
        
        // Forme dei pezzi
        const pieces = 'ILJOTSZ';
        
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let score = 0;
        let gameRunning = false;
        let animationId = null;
        
        // Crea la matrice del gioco
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }
        
        // Crea i pezzi
        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 2, 0],
                    [0, 2, 0],
                    [0, 2, 2],
                ];
            } else if (type === 'J') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [3, 3, 0],
                ];
            } else if (type === 'O') {
                return [
                    [4, 4],
                    [4, 4],
                ];
            } else if (type === 'Z') {
                return [
                    [5, 5, 0],
                    [0, 5, 5],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'T') {
                return [
                    [0, 7, 0],
                    [7, 7, 7],
                    [0, 0, 0],
                ];
            }
        }
        
        // Disegna la matrice
        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // Effetto 3D semplice
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Bordo
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'rgba(0,0,0,0.3)';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }
        
        // Disegna lo stato di gioco
        function draw() {
            context.fillStyle = '#1a1a2e';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }
        
        // Fusiona il pezzo con l'arena
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }
        
        // Ruota la matrice
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }
            
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }
        
        // Controllo collisioni
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                        (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }
        
        // Pulisci le righe complete
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                
                score += rowCount * 10;
                rowCount *= 2;
            }
        }
        
        // Resetta il giocatore
        function playerReset() {
            const piecesStr = 'ILJOTSZ';
            player.matrix = createPiece(piecesStr[piecesStr.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                gameOver();
            }
        }
        
        // Caduta del pezzo
        function playerDrop() {
            player.pos.y++;
            
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            
            dropCounter = 0;
        }
        
        // Movimento laterale
        function playerMove(dir) {
            player.pos.x += dir;
            
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }
        
        // Rotazione del giocatore
        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            
            rotate(player.matrix, dir);
            
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }
        
        // Game Over
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('active');
        }
        
        // Resetta il gioco
        function resetGame() {
            arena.forEach(row => row.fill(0));
            score = 0;
            updateScore();
            document.getElementById('gameOver').classList.remove('active');
            
            playerReset();
        }
        
        // Aggiorna il punteggio
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        // Loop principale
        function update(time = 0) {
            if (!gameRunning) return;
            
            const deltaTime = time - lastTime;
            lastTime = time;
            
            dropCounter += deltaTime;
            
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            
            draw();
            animationId = requestAnimationFrame(update);
        }
        
        // Avvia il gioco
        function startGame() {
            if (gameRunning) return;
            
            resetGame();
            gameRunning = true;
            update();
            
            document.querySelector('.btn').textContent = '⏸️ pause';
        }
        
        // Controls
        document.addEventListener('keydown', event => {
            if (!gameRunning) return;
            
            if (event.keyCode === 37) { // Sinistra
                playerMove(-1);
            } else if (event.keyCode === 39) { // Destra
                playerMove(1);
            } else if (event.keyCode === 40) { // Giù
                playerDrop();
            } else if (event.keyCode === 38) { // Su (ruota)
                playerRotate(1);
            } else if (event.keyCode === 32) { // Spazio (caduta rapida)
                while (!collide(arena, player)) {
                    player.pos.y++;
                }
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                dropCounter = 0;
            }
        });
        
        // Inizializza l'arena
        const arena = createMatrix(12, 20);
        
        // Stato del giocatore
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
        };
        
        playerReset();
        draw();
    </script>
</body>
</html>
